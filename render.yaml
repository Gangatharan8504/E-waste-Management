databases:
  - name: ewaste-db
    databaseName: ewaste_db
    user: ewaste_user
    plan: free

services:
  # 1. Spring Boot Backend Web Service
  - type: web
    name: ewaste-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: ewaste-db
          property: connectionString
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_USERNAME
        value: gangatharan949@gmail.com
      - key: MAIL_PASSWORD
        value: oqpwimlnwrllkscn
      - key: GROQ_API_KEY
        value: ""
      - key: ALLOWED_ORIGINS
        value: "*"

  # 2. React Frontend Static Site
  - type: web
    name: ewaste-frontend
    env: static
    rootDir: e-waste-system-main
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: ""
