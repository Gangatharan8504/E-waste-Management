services:
  # 1. MySQL Database (Run as Private Service in Render)
  - type: pserv
    name: ewaste-db
    env: docker
    plan: free
    dockerImage: mysql:8.0
    disk:
      name: ewaste-db-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_DATABASE
        value: ewaste_db
      - key: MYSQL_ROOT_PASSWORD
        value: rootpassword

  # 2. Spring Boot Backend Web Service
  - type: web
    name: ewaste-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        value: ewaste-db
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: ewaste_db
      - key: DB_USER
        value: root
      - key: DB_PASS
        value: rootpassword
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_USERNAME
        value: gangatharan949@gmail.com
      - key: MAIL_PASSWORD
        value: oqpwimlnwrllkscn
      - key: GROQ_API_KEY
        value: ""
      - key: ALLOWED_ORIGINS
        value: "*"

  # 3. React Frontend Static Site
  - type: web
    name: ewaste-frontend
    env: static
    rootDir: e-waste-system-main
    buildCommand: npm install && npm run build
    publishDir: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ewaste-backend
          type: web
          property: url
