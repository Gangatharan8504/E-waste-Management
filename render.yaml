services:
  # 1. Node.js Express Backend Web Service
  - type: web
    name: ewaste-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_USERNAME
        value: gangatharan949@gmail.com
      - key: MAIL_PASSWORD
        value: oqpwimlnwrllkscn
      - key: GROQ_API_KEY
        value: ""
      - key: ALLOWED_ORIGINS
        value: "*"

  # 2. React Frontend Static Site
  - type: web
    name: ewaste-frontend
    env: static
    rootDir: e-waste-system-main
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: ""
