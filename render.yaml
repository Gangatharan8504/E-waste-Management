services:
  # 1. MySQL Database
  - type: database
    name: ewaste-db
    databaseName: ewaste_db
    user: ewaste_user
    plan: free

  # 2. Spring Boot Backend Web Service
  - type: web
    name: ewaste-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ewaste-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ewaste-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ewaste-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ewaste-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: ewaste-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: MAIL_USERNAME
        value: gangatharan949@gmail.com
      - key: MAIL_PASSWORD
        value: oqpwimlnwrllkscn
      - key: GROQ_API_KEY
        value: ""
      - key: ALLOWED_ORIGINS
        value: "*"

  # 3. React Frontend Static Site
  - type: web
    name: ewaste-frontend
    env: static
    rootDir: e-waste-system-main
    buildCommand: npm install && npm run build
    publishDir: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ewaste-backend
          type: web
          property: url
