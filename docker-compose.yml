version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ewaste_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ewaste_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: ewaste_backend
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ewaste_db
      DB_USER: root
      DB_PASS: rootpassword
      JWT_SECRET: yourjwtsecretkeyhere12345678901234567890
      MAIL_USERNAME: gangatharan949@gmail.com
      MAIL_PASSWORD: oqpwimlnwrllkscn
      GROQ_API_KEY: ""
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5173"
    depends_on:
      - db

  frontend:
    build: ./e-waste-system-main
    container_name: ewaste_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
