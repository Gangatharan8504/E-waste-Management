server.port=8081
spring.application.name=ewaste-backend-v2

# ─── MySQL ────────────────────────────────────────────────────────────────────
# CHANGE: Set your MySQL password below
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ewaste_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:@Murugan8888}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:ecocollect-super-secret-jwt-key-2025-change-in-production-min-256bits}
app.jwt.expiration=86400000

# ─── Email (Gmail SMTP) ───────────────────────────────────────────────────────
# CHANGE: Set your Gmail address and App Password (not your Gmail password)
# To generate App Password: Google Account → Security → 2-Step Verification → App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:gangatharan949@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:oqpwimlnwrllkscn}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Prevent app crash if email fails — emails are sent async so this doesn't block startup
app.email.from=EcoCollect <no-reply@ecocollect.com>

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=55MB
app.upload.dir=./uploads

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.ewaste=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ─── Groq AI Agent Config ─────────────────────────────────────────────────────
app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=llama3-8b-8192
